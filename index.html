  html:not([data-theme="light"]) .content,
  html:not([data-theme="light"]) .app,
  html:not([data-theme="light"]) .home.openai-home,
  html:not([data-theme="light"]) .sidebar,
  html:not([data-theme="light"]) .header {
    background-image: none !important;
  }

  html:not([data-theme="light"]) body {
    background: #090909 !important;
  }
}

@media (prefers-color-scheme: light) {
  html:not([data-theme="dark"]) body {
    background: #f4f2ee !important;
  }
}

body,
button,
input,
select,
textarea {
  font-family: var(--oa-font) !important;
}

html[data-theme="dark"] .oa-command,
html[data-theme="dark"] .search-main input,
html[data-theme="dark"] .bubble,
html[data-theme="dark"] .home-results,
html[data-theme="dark"] .hidden-box.open,
html[data-theme="dark"] .tioumpa-notification-panel {
  box-shadow: none !important;
}

@media (prefers-color-scheme: dark) {
  html:not([data-theme="light"]) .oa-command,
  html:not([data-theme="light"]) .search-main input,
  html:not([data-theme="light"]) .bubble,
  html:not([data-theme="light"]) .home-results,
  html:not([data-theme="light"]) .hidden-box.open,
  html:not([data-theme="light"]) .tioumpa-notification-panel {
    box-shadow: none !important;
  }
}

.oa-eyebrow::before {
  box-shadow: none !important;
}

.oa-author-line {
  margin: -8px 0 0 !important;
  color: var(--oa-muted) !important;
  font-size: clamp(13px, 1.2vw, 16px) !important;
  font-weight: 700 !important;
  letter-spacing: .08em !important;
  text-transform: uppercase !important;
}

.search-main {
  color: var(--oa-muted) !important;
}

.search-main input {
  color: var(--oa-ink) !important;
}

.search-main input::placeholder {
  color: var(--oa-muted) !important;
}

.search-icon.tioumpa-search-svg {
  position: absolute !important;
  left: 24px !important;
  top: 50% !important;
  width: 18px !important;
  height: 18px !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  transform: translateY(-50%) !important;
  color: var(--oa-muted) !important;
  opacity: 1 !important;
  filter: none !important;
  mix-blend-mode: normal !important;
  pointer-events: none !important;
}

.search-icon.tioumpa-search-svg svg,
.tioumpa-mic-btn svg,
.tioumpa-notification-icon svg {
  width: 100% !important;
  height: 100% !important;
  display: block !important;
}

.tioumpa-mic-btn {
  position: absolute !important;
  right: 15px !important;
  top: 50% !important;
  width: 36px !important;
  height: 36px !important;
  min-height: 0 !important;
  padding: 0 !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  transform: translateY(-50%) !important;
  border: 0 !important;
  border-left: 0 !important;
  border-radius: 999px !important;
  background: transparent !important;
  color: var(--oa-muted) !important;
  box-shadow: none !important;
  cursor: pointer !important;
}

.tioumpa-mic-btn:hover {
  background: var(--oa-hover) !important;
  color: var(--oa-ink) !important;
}

.tioumpa-notification-wrap {
  margin-left: 4px !important;
  flex: 0 0 auto !important;
}

.tioumpa-notification-btn {
  width: 32px !important;
  height: 32px !important;
  color: var(--oa-ink) !important;
}

.tioumpa-notification-icon {
  width: 18px !important;
  height: 18px !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  color: currentColor !important;
  opacity: .86 !important;
  filter: none !important;
}

.header .tioumpa-notification-icon,
.header .tioumpa-notification-icon svg {
  display: inline-flex !important;
}

.header .tioumpa-notification-icon img,
.header img.tioumpa-notification-icon {
  display: none !important;
}

@media (max-width: 850px) {
  .oa-author-line {
    margin-top: -4px !important;
    font-size: 12px !important;
  }

  .tioumpa-notification-btn {
    width: 30px !important;
    height: 30px !important;
  }

  .tioumpa-notification-icon {
    width: 17px !important;
    height: 17px !important;
  }
}
</style>

<script id="tioumpa-no-glow-fix-script">
(function() {
  const NOTIFICATION_SVG = `
    <span class="tioumpa-notification-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15.5 17H8.5M18 10.5C18 7.186 15.314 4.5 12 4.5C8.686 4.5 6 7.186 6 10.5V13.25C6 13.842 5.812 14.419 5.462 14.896L4.65 16.003C4.286 16.499 4.64 17.2 5.255 17.2H18.745C19.36 17.2 19.714 16.499 19.35 16.003L18.538 14.896C18.188 14.419 18 13.842 18 13.25V10.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 17.5C13.84 18.514 13.034 19.25 12 19.25C10.966 19.25 10.16 18.514 10 17.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </span>`;

  const SEARCH_SVG = `
    <span class="search-icon tioumpa-search-svg" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10.75 18.5C15.03 18.5 18.5 15.03 18.5 10.75C18.5 6.47 15.03 3 10.75 3C6.47 3 3 6.47 3 10.75C3 15.03 6.47 18.5 10.75 18.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M16.45 16.45L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </span>`;

  const MIC_SVG = `
    <button class="mic tioumpa-mic-btn" type="button" onclick="voiceSearch(event)" aria-label="Microphone search">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14.25C10.48 14.25 9.25 13.02 9.25 11.5V6.75C9.25 5.23 10.48 4 12 4C13.52 4 14.75 5.23 14.75 6.75V11.5C14.75 13.02 13.52 14.25 12 14.25Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M6.75 11.25C6.75 14.15 9.1 16.5 12 16.5C14.9 16.5 17.25 14.15 17.25 11.25" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M12 16.75V20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M9.25 20H14.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>`;

  function escapeAttrSafe(value) {
    if (typeof escapeAttr === "function") return escapeAttr(value);
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function countEntriesSafe() {
    try { return Array.isArray(entries) ? entries.length : 0; } catch (e) { return 0; }
  }

  function textSafe(key, fallback) {
    try { return typeof t === "function" ? t(key) : fallback; } catch (e) { return fallback; }
  }

  function applyThemeChoice(value) {
    const choice = value || localStorage.getItem("themeChoice") || "system";
    if (choice === "system") {
      document.documentElement.removeAttribute("data-theme");
    } else {
      document.documentElement.setAttribute("data-theme", choice);
    }

    try {
      document.querySelectorAll(".theme-simple-btn").forEach(btn => {
        btn.classList.toggle("active", btn.getAttribute("data-theme-value") === choice);
      });
    } catch (e) {}
  }

  window.applyTheme = function(value) {
    applyThemeChoice(value || localStorage.getItem("themeChoice") || "system");
  };

  window.setTheme = function(value) {
    const choice = value || "system";
    localStorage.setItem("themeChoice", choice);
    applyThemeChoice(choice);
  };

  window.updateThemeControl = function() {
    applyThemeChoice(localStorage.getItem("themeChoice") || "system");
  };

  function syncThemeWithSystem() {
    if ((localStorage.getItem("themeChoice") || "system") === "system") applyThemeChoice("system");
  }

  if (!localStorage.getItem("themeChoice")) localStorage.setItem("themeChoice", "system");
  applyThemeChoice(localStorage.getItem("themeChoice") || "system");

  try {
    const lightMQ = window.matchMedia("(prefers-color-scheme: light)");
    const darkMQ = window.matchMedia("(prefers-color-scheme: dark)");
    lightMQ.addEventListener ? lightMQ.addEventListener("change", syncThemeWithSystem) : lightMQ.addListener(syncThemeWithSystem);
    darkMQ.addEventListener ? darkMQ.addEventListener("change", syncThemeWithSystem) : darkMQ.addListener(syncThemeWithSystem);
  } catch (e) {}

  window.ensureTioumpaNotificationInlineIcon = function() {
    const header = document.querySelector(".header");
    if (!header) return;

    let wrap = document.getElementById("tioumpaNotificationWrap");
    if (!wrap) {
      wrap = document.createElement("div");
      wrap.className = "tioumpa-notification-wrap";
      wrap.id = "tioumpaNotificationWrap";
      wrap.setAttribute("onclick", "event.stopPropagation()");
      const langControl = header.querySelector(".lang-control");
      if (langControl) langControl.insertAdjacentElement("afterend", wrap);
      else header.appendChild(wrap);
    }

    wrap.innerHTML = `
      <button class="tioumpa-notification-btn" type="button" aria-label="Ειδοποιήσεις" onclick="toggleTioumpaNotifications(event)">
        ${NOTIFICATION_SVG}
        <span class="tioumpa-notification-dot" aria-hidden="true"></span>
      </button>
      <div class="tioumpa-notification-panel" id="tioumpaNotificationPanel" role="dialog" aria-label="Ειδοποιήσεις"></div>
    `;

    try { if (typeof renderNotificationPanel === "function") renderNotificationPanel(); } catch (e) {}
    try { if (typeof updateNotificationDot === "function") updateNotificationDot(); } catch (e) {}
  };

  function polishHeader() {
    const header = document.querySelector(".header");
    if (!header) return;
    const logo = header.querySelector(":scope > img");
    if (logo) logo.remove();
    const brand = header.querySelector("strong");
    if (brand) brand.textContent = "Tioumpa";
    window.ensureTioumpaNotificationInlineIcon();
  }

  const previousFinalHeaderPass = window.finalHeaderPass;
  window.finalHeaderPass = function() {
    try { if (typeof previousFinalHeaderPass === "function") previousFinalHeaderPass(); } catch (e) {}
    polishHeader();
  };

  const oldShowHome = window.showHome;
  window.showHome = function() {
    try { if (typeof activeFilter !== "undefined") activeFilter = "Όλα"; } catch (e) {}
    const count = countEntriesSafe();
    const content = document.getElementById("content");
    if (!content) {
      if (typeof oldShowHome === "function") oldShowHome();
      polishHeader();
      return;
    }

    const queryValue = (() => { try { return searchQuery || ""; } catch (e) { return ""; } })();

    content.innerHTML = `
      <div class="home openai-home">
        <section class="oa-hero">
          <div class="oa-eyebrow">Λεξικό</div>
          <h1>Το λεξικό<br><span class="soft">του Teosty.</span></h1>
          <p class="oa-subhead">Αναζήτηση ${count} όρων.</p>

          <div class="oa-command">
            <div class="search-wrapper">
              <div class="search-main">
                ${SEARCH_SVG}
                <input id="searchMain" placeholder="${escapeAttrSafe(textSafe("searchPlaceholder", "Αναζήτηση..."))}" value="${escapeAttrSafe(queryValue)}">
                ${MIC_SVG}
              </div>
              <button onclick="clearSearch()">${textSafe("clean", "Clean")}</button>
            </div>
          </div>

          <div class="oa-actions">
            <button class="oa-chip" onclick="renderBubbles()">↻ Τυχαίες λέξεις</button>
            <div class="home-toggle-section">
              <button onclick="toggleHomeList('favoritesBox')">${textSafe("favorites", "⭐ Favorites")}</button>
              <div id="favoritesBox" class="hidden-box">${typeof getFavoritesHTML === "function" ? getFavoritesHTML() : ""}</div>
            </div>
            <button class="mobile-dictionary-toggle" id="mobileDictionaryToggle" onclick="toggleDictionaryResults()">${textSafe("showDictionary", "Εμφάνιση λεξικού")}</button>
          </div>

          <div class="home-results" id="homeResults"></div>
        </section>

        <div class="random-title">${textSafe("randomWords", "ΤΥΧΑΙΕΣ ΛΕΞΕΙΣ")}</div>
        <div class="bubbles" id="bubbles"></div>
      </div>
    `;

    const input = document.getElementById("searchMain");
    if (input) {
      input.addEventListener("input", e => {
        try { searchQuery = e.target.value; } catch (err) {}
        if (typeof renderList === "function") renderList();
        if (typeof renderHomeResults === "function") renderHomeResults();
      });
    }

    if (typeof renderBubbles === "function") renderBubbles();
    if (typeof renderHomeResults === "function") renderHomeResults();
    polishHeader();
  };

  const oldSetLanguage = window.setLanguage;
  window.setLanguage = function(value) {
    if (value === "en") {
      try {
        currentLanguage = "el";
        localStorage.setItem("languageChoice", "el");
      } catch (e) {}
      try { if (typeof applyLanguage === "function") applyLanguage(); } catch (e) {}
      const content = document.getElementById("content");
      if (content) {
        content.innerHTML = `
          <div class="home openai-home tioumpa-coming-soon">
            <section class="tioumpa-coming-soon-card" aria-label="English coming soon">
              <h1>Coming soon</h1>
              <p>The English version of Tioumpa is being prepared. The Greek dictionary is available now.</p>
              <button type="button" onclick="setLanguage('el')">Back to Greek</button>
            </section>
          </div>
        `;
      }
      document.querySelectorAll(".lang-simple-btn").forEach(btn => {
        btn.classList.toggle("active", btn.getAttribute("data-lang-value") === "en");
      });
      polishHeader();
      return;
    }

    if (typeof oldSetLanguage === "function") oldSetLanguage(value);
    setTimeout(polishHeader, 0);
  };

  document.addEventListener("DOMContentLoaded", function() {
    polishHeader();
    applyThemeChoice(localStorage.getItem("themeChoice") || "system");
    if (!location.hash && typeof window.showHome === "function") window.showHome();
  });

  window.addEventListener("load", function() {
    polishHeader();
    applyThemeChoice(localStorage.getItem("themeChoice") || "system");
    if (!location.hash && typeof window.showHome === "function") window.showHome();
  });

  polishHeader();
  if (!location.hash && typeof window.showHome === "function") window.showHome();
})();
</script>



<!-- Final typography tuning: entry fonts + larger alphabetical list headers -->
<style id="tioumpa-entry-fonts-and-list-letters-fix">
/* Keep the entire UI in Inter, but use the requested dictionary-reading fonts only inside entries. */
.entry .entry-title {
  font-family: "Linux Libertine", "Linux Libertine O", "Linux Libertine Display", Georgia, "Times New Roman", serif !important;
  font-weight: 700 !important;
  letter-spacing: -.045em !important;
}

.entry .entry-body {
  font-family: Calibri, Carlito, "Segoe UI", Arial, sans-serif !important;
  font-weight: 400 !important;
  letter-spacing: -.01em !important;
}

.entry .entry-body *:not(table):not(th):not(td):not(button):not(.meta-pill) {
  font-family: Calibri, Carlito, "Segoe UI", Arial, sans-serif !important;
}

/* Bigger alphabet section headers in the dictionary list/sidebar. */
#list .letter,
.sidebar .letter {
  font-family: var(--oa-font) !important;
  font-size: 19px !important;
  line-height: 1.15 !important;
  font-weight: 800 !important;
  letter-spacing: .04em !important;
  color: var(--oa-ink) !important;
  margin-top: 20px !important;
  padding: 0 0 8px !important;
  border-bottom: 1px solid var(--oa-line) !important;
}

@media (max-width: 850px) {
  #list .letter,
  .sidebar .letter {
    font-size: 18px !important;
  }
}
</style>
